<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f5f3ef;
    font-family: 'DM Sans', system-ui, sans-serif;
    color: #2c2a26;
    -webkit-app-region: drag;
    user-select: none;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 40%, rgba(200,149,108,0.08), transparent),
      radial-gradient(ellipse 50% 50% at 80% 20%, rgba(219,176,142,0.06), transparent),
      radial-gradient(ellipse 40% 40% at 20% 70%, rgba(200,149,108,0.05), transparent);
    pointer-events: none;
  }

  .container {
    text-align: center;
    position: relative;
    z-index: 1;
    animation: fade-up 0.6s ease-out both;
  }

  .icon {
    width: 12vh;
    height: 12vh;
    margin: 0 auto 5vh;
    position: relative;
    animation: fade-up 0.6s ease-out 0.1s both;
  }
  .icon::before {
    content: '';
    position: absolute;
    inset: 10%;
    background: linear-gradient(135deg, #c8956c, #a07450);
    transform: rotate(45deg);
    border-radius: 6%;
  }
  .icon::after {
    content: '';
    position: absolute;
    inset: 25%;
    background: #f5f3ef;
    transform: rotate(45deg);
    border-radius: 4%;
  }

  .title {
    font-size: 6.5vh;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: #2c2a26;
    margin-bottom: 1vh;
    animation: fade-up 0.6s ease-out 0.2s both;
  }

  .divider {
    width: 15%;
    height: 2px;
    background: linear-gradient(90deg, transparent, #c8956c, transparent);
    margin: 2.5vh auto;
    animation: fade-up 0.6s ease-out 0.3s both;
  }

  .subtitle {
    font-size: 3vh;
    font-weight: 400;
    color: #8a8478;
    letter-spacing: 0.05em;
    animation: fade-up 0.6s ease-out 0.4s both;
  }

  .dots {
    display: flex;
    gap: 1.5vh;
    justify-content: center;
    margin-top: 5vh;
    animation: fade-up 0.6s ease-out 0.5s both;
  }
  .dot {
    width: 1.5vh;
    height: 1.5vh;
    border-radius: 50%;
    background: #c8956c;
    animation: pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fade-up {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.25; transform: scale(1); }
    50%      { opacity: 1; transform: scale(1.3); }
  }
</style>
</head>
<body>
  <div class="container">
    <div class="icon"></div>
    <div class="title">ARCSTONE</div>
    <div class="divider"></div>
    <div class="subtitle">正在启动，请稍候</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
